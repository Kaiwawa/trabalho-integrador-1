name: Benchmark Image

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

on:
  push:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v4

      - name: Docker Build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          load: true
          tags: trabalho-1:${{ env.IMAGE_TAG }}

      - name: Save Docker image
        run: |
          docker save trabalho-1:${{ env.IMAGE_TAG }} -o ./trabalho-1-${{ env.IMAGE_TAG }}.tar

      - name: Upload Docker image
        uses: actions/upload-artifact@v7.0.1
        with:
          name: imagem-trabalho-1-${{ env.IMAGE_TAG }}
          path: ./trabalho-1-${{ env.IMAGE_TAG }}.tar
          retention-days: 1

  dockle:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Image
        uses: actions/download-artifact@v8.0.1
        with:
          name: imagem-trabalho-1-${{ env.IMAGE_TAG }}
          path: .

      - name: Load Docker Image
        run: |
          docker load -i ./trabalho-1-${{ env.IMAGE_TAG }}.tar

      - name: Run Dockle
        uses: erzz/dockle-action@v1.4.1
        with:
          image: 'trabalho-1:${{ env.IMAGE_TAG }}'
          failure-threshold: 'FATAL'
          exit-code: '1'
          report-format: 'json'
          path: 'dockle-report.json'

      - name: Publish Dockle Summary
        if: always() # 🚨 Executa mesmo se o Dockle falhar e travar o CI
        run: |
          echo "## 🐳 CIS Benchmark (Dockle)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          cat ./dockle-report.json >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY


  trivy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Image
        uses: actions/download-artifact@v8.0.1
        with:
          name: imagem-trabalho-1-${{ env.IMAGE_TAG }}
          path: .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: trabalho-1-${{ env.IMAGE_TAG }}.tar
          format: 'table'
          output: 'trivy-report.txt'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL'

      - name: Publish Trivy Summary
        if: always() # 🚨 Crucial para conseguir ver quais CVEs travaram o seu CI
        run: |
          echo "## 🛡️ Relatório de Vulnerabilidades e Segredos (Trivy)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          cat trivy-report.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

